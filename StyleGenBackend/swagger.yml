openapi: 3.0.0
info:
  title: E-commerce Backend API
  description: API documentation for the StyleGen E-commerce application.
  version: 1.0.0
servers:
  - url: http://localhost:4000/api
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        discountPrice:
          type: number
        stock:
          type: integer
        image:
          type: string
        category:
          type: string
        user:
          type: string
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        user:
          type: string
    Order:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        orderItems:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              quantity: { type: integer }
              image: { type: string }
              price: { type: number }
              product: { type: string }
        shippingAddress:
          type: object
          properties:
            address: { type: string }
            city: { type: string }
            postalCode: { type: string }
            country: { type: string }
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, shipped, delivered, cancelled]

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        201:
          description: User registered successfully
        400:
          description: User already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        400:
          description: Invalid credentials

  /products:
    get:
      tags: [Products]
      summary: Get all products
      responses:
        200:
          description: List of products
    post:
      tags: [Products]
      summary: Create a new product (Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, description, price, stock, image, category]
              properties:
                name: { type: string }
                description: { type: string }
                price: { type: number }
                discountPrice: { type: number }
                stock: { type: integer }
                image: { type: string }
                category: { type: string }
      responses:
        201:
          description: Product created

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Product details
        404:
          description: Product not found
    put:
      tags: [Products]
      summary: Update a product (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Product' }
      responses:
        200:
          description: Product updated
    delete:
      tags: [Products]
      summary: Delete a product (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Product deleted

  /category:
    get:
      tags: [Category]
      summary: Get all categories
      responses:
        200:
          description: List of categories
    post:
      tags: [Category]
      summary: Create a new category (Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, description]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        201:
          description: Category created

  /category/{id}:
    put:
      tags: [Category]
      summary: Update a category (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Category' }
      responses:
        200:
          description: Category updated
    delete:
      tags: [Category]
      summary: Delete a category (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Category deleted

  /orders:
    get:
      tags: [Orders]
      summary: Get all orders (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: List of orders
    post:
      tags: [Orders]
      summary: Create a new order
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderItems, shippingAddress, totalPrice]
              properties:
                orderItems:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      quantity: { type: integer }
                      image: { type: string }
                      price: { type: number }
                      product: { type: string }
                shippingAddress:
                  type: object
                  properties:
                    address: { type: string }
                    city: { type: string }
                    postalCode: { type: string }
                    country: { type: string }
                totalPrice: { type: number }
      responses:
        201:
          description: Order created

  /orders/myorders:
    get:
      tags: [Orders]
      summary: Get logged in user orders
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: List of user orders

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Order details
        404:
          description: Order not found

  /orders/{id}/status:
    put:
      tags: [Orders]
      summary: Update order status (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, shipped, delivered, cancelled]
      responses:
        200:
          description: Order status updated
